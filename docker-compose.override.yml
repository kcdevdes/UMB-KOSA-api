services:
  postgres:
    image: postgres:latest
    container_name: kosa_postgres
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    env_file:
      - .env

  app:
    depends_on:
      - postgres
    ports:
        - "8080:8080"
    env_file:
      - .env

volumes:
  pg_data:
