name: Deploy KOSA Web App

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t kcdevdes/umb-kosa-api:latest .
          docker push kcdevdes/umb-kosa-api:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Connect to EC2 and Deploy
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/umb-kosa-api

            echo "Fetching latest code..."
            git pull origin main 
            
            echo "Checking if .env.prod exists..."
            if [ ! -f "/home/ubuntu/umb-kosa-api/.env.prod" ]; then
              echo ".env.prod file not found! Exiting..."
              exit 1
            fi
            
            echo "Stopping existing containers..."
            sudo docker compose --env-file /home/ubuntu/umb-kosa-api/.env.prod -f /home/ubuntu/umb-kosa-api/docker-compose.prod.yml down
            
            echo "Pulling latest image..."
            sudo docker pull kcdevdes/umb-kosa-api:latest
            
            echo "Starting new container..."
            sudo docker compose --env-file /home/ubuntu/umb-kosa-api/.env.prod -f /home/ubuntu/umb-kosa-api/docker-compose.prod.yml up -d
